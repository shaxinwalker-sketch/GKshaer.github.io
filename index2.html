<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1粉丝群付费入群</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            margin-bottom: 10px;
            color: #333;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn.white {
            background: #07C160;
            color: white;
        }
        .btn.blue {
            background: #1677FF;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>F1永久粉丝群</h2>
        <p>付款 35 元，自动进入粉丝群</p>

        <!-- 微信支付 -->
        <form action="https://www.ezfpy.cn/submit.php" method="POST" target="_blank">
            <input type="hidden" name="pid" value="1523">
            <input type="hidden" name="type" value="1">
            <input type="hidden" name="out_trade_no" value="F1永久粉丝群">
            <input type="hidden" name="name" value="F1永久粉丝群">
            <input type="hidden" name="money" value="35">
            <input type="hidden" name="notify_url" value="https://www.ezfpy.cn/notify_url.php">
            <input type="hidden" name="return_url" value="https://www.ezfpy.cn/return_url.php">
            <input type="hidden" name="sitename" value="F1粉丝群">
            <input type="hidden" name="sign" value="MD5">
            <input type="hidden" name="sign_type" value="MD5">
            <button type="submit" class="btn white">微信支付 35元</button>
        </form>

        <!-- 支付宝支付 -->
        <form action="https://www.ezfpy.cn/submit.php" method="POST" target="_blank">
            <input type="hidden" name="pid" value="1523">
            <input type="hidden" name="type" value="2">
            <input type="hidden" name="out_trade_no" value="F1永久粉丝群">
            <input type="hidden" name="name" value="F1永久粉丝群">
            <input type="hidden" name="money" value="35">
            <input type="hidden" name="notify_url" value="https://www.ezfpy.cn/notify_url.php">
            <input type="hidden" name="return_url" value="https://www.ezfpy.cn/return_url.php">
            <input type="hidden" name="sitename" value="F1粉丝群">
            <input type="hidden" name="sign" value="MD5">
            <input type="hidden" name="sign_type" value="MD5">
            <button type="submit" class="btn blue">支付宝支付 35元</button>
        </form>
    </div>
</body>
</html>
