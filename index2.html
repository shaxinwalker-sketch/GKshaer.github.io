<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1永久粉丝群</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: #16213e;
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #e94560;
        }
        p {
            font-size: 14px;
            color: #a8b2d1;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .btn.wx {
            background: #07c160;
            color: #fff;
        }
        .btn.ali {
            background: #1677ff;
            color: #fff;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .input-box {
            margin: 20px 0;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f3460;
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .verify-btn {
            background: #e94560;
            color: #fff;
        }
        .group-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #0f3460;
            border-radius: 8px;
        }
        .group-box img {
            width: 100%;
            border-radius: 8px;
        }
    </style>
    <script src="https://cdn.bootcdn.net/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
</head>
<body>
    <div class="box">
        <h1>F1永久粉丝群</h1>
        <p>35元永久进群<br>直播密码、内部内容都在群里</p>

        <!-- 微信支付按钮（易支付全自动） -->
        
<!-- 微信支付按钮（全自动） -->
<form action="https://www.ezfpy.cn/submit.php" method="POST" id="wxPayForm">
  <input type="hidden" name="pid" value="1523"> <!-- 替换成你的易支付PID -->
  <input type="hidden" name="type" value="1"> <!-- 微信通道type，一般是1 -->
  <input type="hidden" name="out_trade_no" id="wxTradeNo">
  <input type="hidden" name="name" value="F1永久粉丝群">
  <input type="hidden" name="money" value="35">
  <input type="hidden" name="notify_url" value="https://你的回调地址"> <!-- 易支付后台的回调地址 -->
  <input type="hidden" name="return_url" value="https://shaxinwalker-sketch.github.io/你的群码页面.html"> <!-- 付款成功后跳转的群码页 -->
  <input type="hidden" name="sitename" value="F1粉丝群">
  <input type="hidden" name="sign" id="wxSign">
  <input type="hidden" name="sign_type" value="MD5">
  <button type="submit" class="btn green">微信支付 35元</button>
</form>

<!-- 支付宝支付按钮（全自动） -->
<form action="https://www.ezfpy.cn/submit.php" method="POST" id="aliPayForm">
  <input type="hidden" name="pid" value="1523"> <!-- 替换成你的易支付PID -->
  <input type="hidden" name="type" value="2"> <!-- 支付宝通道type，一般是2 -->
  <input type="hidden" name="out_trade_no" id="aliTradeNo">
  <input type="hidden" name="name" value="F1永久粉丝群">
  <input type="hidden" name="money" value="35">
  <input type="hidden" name="notify_url" value="https://你的回调地址"> <!-- 易支付后台的回调地址 -->
  <input type="hidden" name="return_url" value="https://shaxinwalker-sketch.github.io/你的群码页面.html"> <!-- 付款成功后跳转的群码页 -->
  <input type="hidden" name="sitename" value="F1粉丝群">
  <input type="hidden" name="sign" id="aliSign">
  <input type="hidden" name="sign_type" value="MD5">
  <button type="submit" class="btn blue">支付宝支付 35元</button>
</form>

<!-- 删掉原来的手动口令部分，只保留这两个支付按钮 -->
        <!-- 支付宝备用按钮（手动口令模式） -->
        <button class="btn ali" onclick="alert('支付宝支付后请联系主播获取口令：1644')">支付宝支付 35元</button>

        <!-- 口令验证区 -->
        <div class="input-box">
            <input type="text" id="passInput" placeholder="输入支付口令获取群码">
            <button class="btn verify-btn" onclick="verifyPass()">验证口令</button>
        </div>

        <!-- 群码展示区 -->
        <div class="group-box" id="groupBox">
            <img src="new-wechat-group.png" alt="微信群二维码">
            <p style="margin-top:10px;">扫码进群即可</p>
        </div>
    </div>

    <script>
      // 生成微信订单号
document.getElementById('wxTradeNo').value = 'F1GROUP_WX_' + Date.now();
// 生成支付宝订单号
document.getElementById('aliTradeNo').value = 'F1GROUP_ALI_' + Date.now();

// 计算微信签名（替换成你的易支付密钥）
function calcWxSign() {
  const pid = "1523"; // 你的易支付PID
  const type = "1";
  const out_trade_no = document.getElementById('wxTradeNo').value;
  const name = "F1永久粉丝群";
  const money = "35";
  const notify_url = "https://你的回调地址";
  const return_url = "https://shaxinwalker-sketch.github.io/你的群码页面.html";
  const sitename = "F1粉丝群";
  const key = "你的易支付密钥"; // 易支付后台的对接密钥

  const str = `pid=${pid}&type=${type}&out_trade_no=${out_trade_no}&name=${name}&money=${money}&notify_url=${notify_url}&return_url=${return_url}&sitename=${sitename}${key}`;
  document.getElementById('wxSign').value = md5(str);
}

// 计算支付宝签名（替换成你的易支付密钥）
function calcAliSign() {
  const pid = "1523"; // 你的易支付PID
  const type = "2";
  const out_trade_no = document.getElementById('aliTradeNo').value;
  const name = "F1永久粉丝群";
  const money = "35";
  const notify_url = "https://你的回调地址";
  const return_url = "https://shaxinwalker-sketch.github.io/你的群码页面.html";
  const sitename = "F1粉丝群";
  const key = "你的易支付密钥"; // 易支付后台的对接密钥

  const str = `pid=${pid}&type=${type}&out_trade_no=${out_trade_no}&name=${name}&money=${money}&notify_url=${notify_url}&return_url=${return_url}&sitename=${sitename}${key}`;
  document.getElementById('aliSign').value = md5(str);
}

// 页面加载时计算签名
calcWxSign();
calcAliSign();

        // 口令验证
        function verifyPass() {
            const input = document.getElementById('passInput').value.trim();
            const groupBox = document.getElementById('groupBox');
            if (input === '1644') {
                groupBox.style.display = 'block';
            } else {
                alert('口令错误，请联系主播确认！');
                groupBox.style.display = 'none';
            }
        }
    </script>
</body>
</html>
