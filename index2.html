<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1粉丝群</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
  body{background:#1a1a2e;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{max-width:400px;width:100%;background:#16213e;border-radius:16px;padding:30px;text-align:center}
  h1{margin-bottom:10px;color:#e94560}
  p{color:#a0a0b8;margin-bottom:20px}
  .btn{width:100%;padding:16px;margin:10px 0;border:none;border-radius:12px;font-size:16px;color:#fff;font-weight:bold;cursor:pointer}
  .wx{background:#07C160}
  .ali{background:#1677FF}
  .code{margin:15px 0;display:none;padding:15px;background:#0f172a;border-radius:12px}
  .code img{width:80%;border-radius:10px}
  .input-box{margin:20px 0}
  input{width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#0f172a;color:#fff;font-size:16px;text-align:center}
  .verify-btn{background:#e94560;margin-top:10px}
  .group-box{margin-top:20px;padding:15px;background:#0f172a;border-radius:12px;display:none}
  .group-box img{width:100%;border-radius:8px}
</style>
</head>
<body>
<div class="box">
  <h1>F1 永久粉丝群</h1>
  <p>35元永久进群<br>直播密码、内部内容都在群里</p>

  <button class="btn wx" onclick="document.getElementById('wx').style.display='block'">
    微信支付 35元
  </button>
  <div class="code" id="wx">
    <img src="wechat-pay.png">
    <p style="margin-top:10px">支付成功后，向主播索要口令</p>
  </div>

  <button class="btn ali" onclick="document.getElementById('ali').style.display='block'">
    支付宝支付 35元
  </button>
  <div class="code" id="ali">
    <img src="alipay-pay.png">
    <p style="margin-top:10px">支付成功后，向主播索要口令</p>
  </div>

  <div class="input-box">
    <input type="text" id="pass" placeholder="输入支付成功口令">
    <button class="btn verify-btn" onclick="check()">验证口令</button>
  </div>

  <div class="group-box" id="group">
    <img src="wechat-group.png">
    <p style="margin-top:10px">扫码进微信群</p>
  </div>
</div>

<script>
  // 👇 口令就在这里！把双引号里的内容改成你的新口令
  const PASSWORD = "1644";
  function check() {
    let input = document.getElementById('pass').value.trim();
    if(input === PASSWORD) {
      document.getElementById('group').style.display = 'block';
    } else {
      alert("口令错误，请确认支付成功！");
    }
  }
</script>
</body>
</html>
