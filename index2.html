<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洗洗F1 - 粉丝群上车</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #1a1a2e; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; background: #16213e; border-radius: 16px; padding: 30px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { font-size: 24px; margin-bottom: 10px; color: #e94560; }
        p { color: #a0a0b8; margin-bottom: 25px; line-height: 1.6; }
        .pay-btn { display: block; width: 100%; padding: 16px; margin: 12px 0; border: none; border-radius: 10px; color: white; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .wechat { background: #07C160; }
        .wechat:hover { background: #06ad56; }
        .alipay { background: #1677FF; }
        .alipay:hover { background: #1366d6; }
        .tip { font-size: 12px; color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 洗洗F1 粉丝专属群</h1>
        <p>35元永久上车<br>每站直播密码准时发群<br>一劳永逸，安稳看球</p>
        
        <button class="pay-btn wechat" onclick="pay('wechat')">
            🟢 微信支付 ¥35
        </button>
        <button class="pay-btn alipay" onclick="pay('alipay')">
            🔵 支付宝支付 ¥35
        </button>
        
        <div class="tip">
            支付成功后自动跳转到群二维码<br>若未跳转，请联系客服：17561161510
        </div>
    </div>

    <script>
        function pay(type) {
            alert("正在跳转到" + (type === 'wechat' ? "微信" : "支付宝") + "支付页面...");
            setTimeout(() => {
                window.location.href = "success.html";
            }, 1000);
        }
    </script>
</body>
</html>
