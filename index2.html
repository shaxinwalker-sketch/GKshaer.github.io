<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1粉丝群 35元入群</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f5f5f5;padding:20px}
.container{max-width:400px;margin:40px auto;background:#fff;border-radius:16px;padding:30px;text-align:center}
h2{margin-bottom:10px}
.price{font-size:28px;color:red;margin:20px 0}
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;margin:8px 0;color:#fff}
.wx{background:#07c160}
.ali{background:#1677ff}
.confirm{background:#ff3333}
.qrcode{width:240px;height:240px;margin:15px auto;display:none}
.group{width:280px;height:280px;margin:20px auto;display:none}
.msg{color:green;font-weight:bold;margin:10px 0;display:none}
</style>
</head>
<body>
<div class="container">
<h2>🏁 F1永久粉丝群</h2>
<p>内部资讯 · 直播福利 · 实时聊车</p>
<div class="price">¥35</div>

<button class="btn wx" onclick="showWx()">微信支付</button>
<button class="btn ali" onclick="showAli()">支付宝支付</button>

<img id="wx" class="qrcode" src="wechat-pay.png">
<img id="ali" class="qrcode" src="alipay-pay.png">

<button class="btn confirm" onclick="showQun()" id="confirm" style="display:none">✅ 我已付款，进群</button>

<div class="msg" id="msg">付款成功！请扫码进群</div>
<img id="qun" class="group" src="new-wechat-group.png">

<p style="margin-top:20px;color:#999;font-size:14px">
未付款请勿点击，主播会核对账单，未付款无法进群
</p>
</div>

<script>
function showWx(){
  document.getElementById('wx').style.display='block'
  document.getElementById('ali').style.display='none'
  document.getElementById('confirm').style.display='block'
  document.getElementById('msg').style.display='none'
  document.getElementById('qun').style.display='none'
}
function showAli(){
  document.getElementById('ali').style.display='block'
  document.getElementById('wx').style.display='none'
  document.getElementById('confirm').style.display='block'
  document.getElementById('msg').style.display='none'
  document.getElementById('qun').style.display='none'
}
function showQun(){
  if(confirm('⚠ 确认已完成35元付款吗？未付款无法进群')){
    document.getElementById('msg').style.display='block'
    document.getElementById('qun').style.display='block'
  }
}
</script>
</body>
</html>
