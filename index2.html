<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1永久粉丝群 - 35元入群</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f7f8fa;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            margin: 40px auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
        }
        .price {
            font-size: 32px;
            color: #ff4444;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .pay-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .wx-btn {
            background: #07C160;
            color: white;
        }
        .ali-btn {
            background: #1677FF;
            color: white;
        }
        .pay-btn:active {
            transform: scale(0.98);
        }
        .qrcode {
            width: 240px;
            height: 240px;
            margin: 15px auto;
            border-radius: 8px;
            display: none;
        }
        .verify-box {
            margin-top: 25px;
            display: none;
        }
        .verify-input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }
        .verify-btn {
            width: 100%;
            padding: 14px;
            background: #07C160;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }
        .group-qrcode {
            width: 280px;
            height: 280px;
            margin: 20px auto;
            border-radius: 12px;
            display: none;
        }
        .success-text {
            font-size: 20px;
            color: #07C160;
            font-weight: bold;
            margin-bottom: 15px;
            display: none;
        }
        .tip {
            font-size: 13px;
            color: #999;
            margin-top: 20px;
        }
        .error-text {
            font-size: 14px;
            color: #ff4444;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🏁 F1永久粉丝群</div>
        <div class="subtitle">专属赛事解析 / 内部资讯 / 主播福利</div>
        <div class="price">¥35</div>

        <!-- 支付按钮 -->
        <button class="pay-btn wx-btn" onclick="showWxPay()">微信支付 35元</button>
        <button class="pay-btn ali-btn" onclick="showAliPay()">支付宝支付 35元</button>

        <!-- 微信收款码 -->
        <img class="qrcode" id="wxQrcode" src="https://shaxinwalker-sketch.github.io/wechat-pay.png" alt="微信收款码">

        <!-- 支付宝收款码 -->
        <img class="qrcode" id="aliQrcode" src="https://shaxinwalker-sketch.github.io/alipay-pay.png" alt="支付宝收款码">

        <!-- 订单验证区域（初始隐藏） -->
        <div class="verify-box" id="verifyBox">
            <p style="margin-bottom: 10px; color: #333;">请输入您的35元付款订单号（微信/支付宝订单号）：</p>
            <input type="text" class="verify-input" id="orderInput" placeholder="请输入订单号">
            <button class="verify-btn" onclick="verifyOrder()">✅ 验证订单，进群</button>
            <div class="error-text" id="errorText">订单号错误！请核对后重新输入，或私信主播核验</div>
        </div>

        <!-- 付款成功 & 群二维码 -->
        <div class="success-text" id="successText">付款成功！扫码进群</div>
        <img class="group-qrcode" id="groupQrcode" src="https://shaxinwalker-sketch.github.io/new-wechat-group.png" alt="F1粉丝群">

        <div class="tip">付款后输入订单号，验证通过后自动进群</div>
    </div>

    <script>
        // 初始化：页面加载时，隐藏所有非初始元素
        window.onload = function() {
            document.getElementById('wxQrcode').style.display = 'none';
            document.getElementById('aliQrcode').style.display = 'none';
            document.getElementById('verifyBox').style.display = 'none';
            document.getElementById('successText').style.display = 'none';
            document.getElementById('groupQrcode').style.display = 'none';
            document.getElementById('errorText').style.display = 'none';
        }

        // 显示微信支付
        function showWxPay() {
            document.getElementById('wxQrcode').style.display = 'block';
            document.getElementById('aliQrcode').style.display = 'none';
            document.getElementById('verifyBox').style.display = 'block'; // 只有点支付，才出验证框
            // 每次点支付，隐藏群码
            document.getElementById('successText').style.display = 'none';
            document.getElementById('groupQrcode').style.display = 'none';
            document.getElementById('errorText').style.display = 'none';
        }

        // 显示支付宝支付
        function showAliPay() {
            document.getElementById('aliQrcode').style.display = 'block';
            document.getElementById('wxQrcode').style.display = 'none';
            document.getElementById('verifyBox').style.display = 'block'; // 只有点支付，才出验证框
            // 每次点支付，隐藏群码
            document.getElementById('successText').style.display = 'none';
            document.getElementById('groupQrcode').style.display = 'none';
            document.getElementById('errorText').style.display = 'none';
        }

        // 验证订单号（核心防白嫖！）
        function verifyOrder() {
            const input = document.getElementById('orderInput').value.trim();
            // 你可以在这里设置正确的订单号，比如：F12026MIAMI35
            const validOrder = "F12026MIAMI35";

            if (input === validOrder) {
                // 订单号正确，显示群码
                document.getElementById('successText').style.display = 'block';
                document.getElementById('groupQrcode').style.display = 'block';
                document.getElementById('verifyBox').style.display = 'none';
                document.getElementById('errorText').style.display = 'none';
            } else {
                // 订单号错误，显示提示
                document.getElementById('errorText').style.display = 'block';
                document.getElementById('orderInput').value = '';
            }
        }

        // 按回车触发验证
        document.getElementById('orderInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyOrder();
            }
        });
    </script>
</body>
</html>
